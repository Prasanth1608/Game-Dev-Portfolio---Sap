  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

oke-width='1.6'/%3E%3Cpath d='M20 2H26V8' fill='none' stroke='%23FF6F91' stroke-width='1.6'/%3E%3Cpath d='M26 20V26H20' fill='none' stroke='%23FF6F91' stroke-width='1.6'/%3E%3Cpath d='M8 26H2V20' fill='none' stroke='%23FF6F91' stroke-width='1.6'/%3E%3C/svg%3E\") 14 14, pointer;\n    }\n    body { cursor: var(--cur-default); }\n    a, button { cursor: var(--cur-hover); }\n    a { color: #FFC857; text-decoration: none; }\n    a:hover { filter: brightness(1.15); }\n    @keyframes ap-teleport-in { 0% { opacity: 0; transform: translate(-50%, -55%) scale(0.3); filter: brightness(3) saturate(2); } 55% { opacity: 1; transform: translate(-50%, -65%) scale(1.15); filter: brightness(1.6); } 100% { opacity: 1; transform: translate(-50%, -60%) scale(1); filter: brightness(1); } }\n    @keyframes ap-idle-sway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }\n  <\u002Fstyle>\n  \n<\u002Fhelmet>\n\n<div data-screen-label=\"Journey\" style=\"position: relative; min-height: 100vh; background: #000000; font-family: 'Space Grotesk', sans-serif; color: #EAF3F8; padding-bottom: 60px; box-sizing: border-box; overflow-x: hidden\">\n\n  <!-- ===== backdrop glow (tracks active milestone) ===== -->\n  <div style=\"position: fixed; inset: 0; pointer-events: none; z-index: 0; background: {{ backdropBg }}; transition: background 0.2s linear\"><\u002Fdiv>\n\n  <!-- ===== nav (sticky, full navigation) ===== -->\n  <div style=\"position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; z-index: 20; background: rgba(0,0,0,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.06)\">\n    <a href=\"Home.dc.html\" style=\"font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.08em; color: #EAF3F8\">AP<span style=\"color: #FFC857\">®<\u002Fspan><\u002Fa>\n    <div style=\"display: flex; align-items: center; gap: 24px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.2em\">\n      <a href=\"Home.dc.html\" style=\"color: rgba(234,243,248,0.75)\" style-hover=\"color: #FFDE59\">HOME<\u002Fa>\n      <a href=\"Works.dc.html\" style=\"color: rgba(234,243,248,0.75)\" style-hover=\"color: #FFDE59\">WORK<\u002Fa>\n      <a href=\"Journey.dc.html\" style=\"color: #FFC857\">JOURNEY<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== header ===== -->\n  <div style=\"position: relative; z-index: 2; text-align: center; padding: 30px 40px 10px 40px\">\n    <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.4em; color: #6EE7C8\">&gt; LEVEL PROGRESSION<\u002Fdiv>\n    <h1 style=\"margin: 12px 0 0 0; font-family: 'Bebas Neue', sans-serif; font-weight: 400; font-size: clamp(46px, 7vw, 96px); line-height: 0.9; color: #EAF3F8\">THE GAME DEV RUN<\u002Fh1>\n    <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: rgba(234,243,248,0.45); margin-top: 10px\">scroll and teleport with me through my timeline — no flux capacitor required ↓<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== timeline path (decorative dashed line) ===== -->\n  <div style=\"position: relative; z-index: 2; max-width: 900px; margin: 40px auto 0 auto; padding: 0 40px\">\n    <div style=\"position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: repeating-linear-gradient(0deg, rgba(234,243,248,0.25) 0px, rgba(234,243,248,0.25) 10px, transparent 10px, transparent 20px); transform: translateX(-50%)\"><\u002Fdiv>\n\n    <sc-for list=\"{{ milestones }}\" as=\"stop\" hint-placeholder-count=\"6\">\n      <div style=\"{{ stop.rowStyle }}\">\n        <div style=\"{{ stop.cardStyle }}\">\n          <div style=\"font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 0.05em; color: {{ stop.accent }}; line-height: 1\">{{ stop.year }}<\u002Fdiv>\n          <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: {{ stop.accent }}; margin: 8px 0 10px 0\">{{ stop.tag }}<\u002Fdiv>\n          <div style=\"font-size: 14px; line-height: 1.6; color: rgba(234,243,248,0.8)\">{{ stop.text }}<\u002Fdiv>\n          <sc-if value=\"{{ stop.showRunner }}\" hint-placeholder-val=\"{{ false }}\">\n            <div key=\"{{ stop.year }}\" style=\"{{ stop.runnerStyle }}\">\n              <div style=\"animation: ap-idle-sway 2.2s ease-in-out infinite\">\n                <img src=\"736e758f-28b6-4863-89b9-f9d400d872b5\" alt=\"Runner\" style=\"width: 92px; height: auto; image-rendering: pixelated; display: block; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6))\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"{{ stop.dotStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== footer strip ===== -->\n  <div style=\"position: relative; z-index: 2; margin-top: 70px; border-top: 1px solid rgba(184,139,255,0.3); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: rgba(234,243,248,0.5)\">\n    <span>© ANANTHA PRASANTH<\u002Fspan>\n    <a href=\"Home.dc.html\" style=\"color: #6EE7C8\" style-hover=\"color: #FFDE59\">◂ BACK TO TITLE<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst MILESTONES = [\n  { year: '2021', tag: 'FIRST STEPS', accent: '#6EE7C8', text: 'Placeholder — started learning game dev fundamentals, picked up C# and the basics of Unity.' },\n  { year: '2022', tag: 'FIRST BUILD', accent: '#FFC857', text: 'Placeholder — shipped a first prototype / game jam entry, learned the full build-and-ship loop.' },\n  { year: '2023', tag: 'LEVEL UP', accent: '#FF6F91', text: 'Placeholder — moved into Unreal Engine and C++, took on bigger systems work.' },\n  { year: '2024', tag: 'SHIPPED', accent: '#B98BFF', text: 'Placeholder — shipped a full title / joined a studio, worked across gameplay and tools.' },\n  { year: '2025', tag: 'SPECIALIZED', accent: '#00E5CC', text: 'Placeholder — went deep on a specialty (multiplayer, shaders, tools — whatever fits) across projects.' },\n  { year: '2026', tag: 'NOW', accent: '#FF8A5B', text: 'Placeholder — where things stand today, and what you are building or looking for next.' }\n];\n\nfunction hexToRgbObj(hex) {\n  const h = hex.replace('#', '');\n  return {\n    r: parseInt(h.substring(0, 2), 16),\n    g: parseInt(h.substring(2, 4), 16),\n    b: parseInt(h.substring(4, 6), 16)\n  };\n}\n\nfunction lerp(a, b, t) {\n  return a + (b - a) * t;\n}\n\nclass Component extends DCLogic {\n  state = { activeIndex: 0, currentRGB: hexToRgbObj(MILESTONES[0].accent) };\n\n  componentDidMount() {\n    this.onScroll = () => {\n      if (this.raf) return;\n      this.raf = requestAnimationFrame(() => {\n        this.raf = null;\n        const max = Math.max(document.body.scrollHeight - window.innerHeight, 1);\n        const progress = Math.min(Math.max(window.scrollY / max, 0), 1);\n        const n = MILESTONES.length;\n        const activeIndex = Math.min(Math.floor(progress * n), n - 1);\n        if (activeIndex !== this.state.activeIndex) this.setState({ activeIndex });\n      });\n    };\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n    this.onScroll();\n\n    const tick = () => {\n      const target = hexToRgbObj(MILESTONES[this.state.activeIndex].accent);\n      const cur = this.state.currentRGB;\n      const nr = lerp(cur.r, target.r, 0.06);\n      const ng = lerp(cur.g, target.g, 0.06);\n      const nb = lerp(cur.b, target.b, 0.06);\n      if (Math.abs(nr - cur.r) > 0.1 || Math.abs(ng - cur.g) > 0.1 || Math.abs(nb - cur.b) > 0.1) {\n        this.setState({ currentRGB: { r: nr, g: ng, b: nb } });\n      }\n      this.lerpRaf = requestAnimationFrame(tick);\n    };\n    this.lerpRaf = requestAnimationFrame(tick);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll);\n    if (this.raf) cancelAnimationFrame(this.raf);\n    if (this.lerpRaf) cancelAnimationFrame(this.lerpRaf);\n  }\n\n  renderVals() {\n    const milestones = MILESTONES.map((m, i) => {\n      const left = i % 2 === 0;\n      const active = i === this.state.activeIndex;\n      return {\n        ...m,\n        showRunner: active,\n        rowStyle: {\n          position: 'relative',\n          display: 'flex',\n          justifyContent: left ? 'flex-start' : 'flex-end',\n          padding: '50px 0',\n          minHeight: '160px'\n        },\n        cardStyle: {\n          position: 'relative',\n          width: 'calc(50% - 40px)',\n          border: `1px solid ${m.accent}55`,\n          background: '#050809',\n          padding: '22px 24px',\n          boxSizing: 'border-box',\n          overflow: 'visible'\n        },\n        runnerStyle: {\n          position: 'absolute',\n          top: 0,\n          left: '50%',\n          transform: 'translate(-50%, -60%)',\n          zIndex: 5,\n          pointerEvents: 'none',\n          animation: 'ap-teleport-in 0.5s cubic-bezier(0.2, 0.9, 0.3, 1) both'\n        },\n        dotStyle: {\n          position: 'absolute',\n          top: '58px',\n          left: '50%',\n          transform: 'translateX(-50%)',\n          width: '14px',\n          height: '14px',\n          borderRadius: '50%',\n          background: m.accent,\n          boxShadow: `0 0 14px ${m.accent}`\n        }\n      };\n    });\n\n    const { r, g, b } = this.state.currentRGB;\n    const rr = Math.round(r), rg = Math.round(g), rb = Math.round(b);\n    const mix = (ratio, dark) => `rgb(${Math.round(rr * ratio + dark[0] * (1 - ratio))},${Math.round(rg * ratio + dark[1] * (1 - ratio))},${Math.round(rb * ratio + dark[2] * (1 - ratio))})`;\n    const backdropBg = `radial-gradient(ellipse 1600px 1300px at 50% 50%, ${mix(0.32, [10, 14, 16])} 0%, ${mix(0.15, [8, 11, 12])} 30%, ${mix(0.05, [5, 7, 8])} 60%, #000000 100%)`;\n\n    return { milestones, backdropBg };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
